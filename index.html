<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bicycle Ki Calculator</title>
  <script src="./vendor/xlsx.bundle.js"></script>
  <script>
    if (!window.XLSX) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"><\/script>');
    }
  </script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #172026;
      --muted: #61717f;
      --line: #d9e0e7;
      --accent: #176b87;
      --accent-2: #7a4b2a;
      --good: #1f7a4d;
      --warn: #9a5b00;
      --bad: #b3261e;
      --soft: #e9f4f6;
      --shadow: 0 12px 30px rgba(22, 35, 45, 0.08);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, #eef4f5 0, rgba(238, 244, 245, 0) 240px),
        var(--bg);
    }

    main {
      width: min(1280px, calc(100vw - 32px));
      margin: 24px auto 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.15;
      font-weight: 760;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0;
      padding: 14px 16px 12px;
      font-size: 15px;
      border-bottom: 1px solid var(--line);
    }

    .controls {
      padding: 16px;
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 12px;
      font-weight: 680;
      color: #344450;
    }

    input[type="number"], input[type="text"], select {
      width: 100%;
      border: 1px solid #c7d1da;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      min-height: 38px;
      padding: 8px 10px;
      font: inherit;
    }

    input[type="file"] {
      width: 100%;
      border: 1px dashed #9fb0bd;
      border-radius: 8px;
      padding: 16px 12px;
      background: #fbfcfd;
      color: var(--muted);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 4px;
    }

    button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.secondary {
      background: #fff;
      color: var(--accent);
      border-color: #9fc3cd;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .status {
      min-height: 34px;
      padding: 9px 10px;
      border-radius: 6px;
      background: #f2f5f7;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .status.good { background: #eaf6ef; color: var(--good); }
    .status.warn { background: #fff5df; color: var(--warn); }
    .status.bad { background: #fdecea; color: var(--bad); }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfd;
    }

    .metric .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 720;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric .value {
      margin-top: 7px;
      font-size: 22px;
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tabs {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      border: 1px solid #c4d2da;
      color: #31515d;
      background: #fff;
      padding: 7px 10px;
      min-height: 32px;
      white-space: nowrap;
    }

    .tab.active {
      color: #fff;
      background: var(--accent-2);
      border-color: var(--accent-2);
    }

    .table-wrap {
      overflow: auto;
      max-height: 520px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th, td {
      border-bottom: 1px solid #edf1f4;
      padding: 8px 9px;
      text-align: right;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f7fafb;
      color: #334854;
      font-weight: 760;
    }

    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }

    .log {
      padding: 12px 16px 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      border-top: 1px solid var(--line);
      max-height: 160px;
      overflow: auto;
      background: #fbfcfd;
    }

    .chart-panel {
      padding: 14px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .chart-controls {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr) minmax(0, 1fr);
      gap: 10px;
    }

    canvas {
      width: 100%;
      height: 300px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    @media (max-width: 900px) {
      main { width: min(100vw - 20px, 760px); }
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-controls { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Bicycle Ki Calculator</h1>
        <p class="subtitle">Whole-curve FP competition fit using the Bicycle cubic binding model.</p>
      </div>
      <button id="exportBtn" class="secondary" disabled>Export XLSX</button>
    </header>

    <div class="grid">
      <section class="panel">
        <h2>Inputs</h2>
        <div class="controls">
          <label>
            Excel workbook
            <input id="fileInput" type="file" accept=".xlsx,.xlsm" />
          </label>

          <div class="row">
            <label>
              Protein total
              <input id="proteinInput" type="number" min="0" step="any" placeholder="80" />
            </label>
            <label>
              Tracer total
              <input id="tracerInput" type="number" min="0" step="any" placeholder="10" />
            </label>
          </div>

          <div class="row">
            <label>
              Tracer Kd / Klig
              <input id="kdInput" type="number" min="0" step="any" placeholder="Enter Klig" />
            </label>
            <label>
              Active protein c
              <input id="activeInput" type="number" min="0" step="any" value="1" />
            </label>
          </div>

          <div class="row">
            <label>
              Unit
              <select id="unitInput">
                <option value="nM" selected>nM</option>
                <option value="uM">uM</option>
              </select>
            </label>
            <label>
              Fit source
              <select id="sourceInput">
                <option value="mean" selected>Mean curve</option>
                <option value="replicates">Replicates + mean</option>
              </select>
            </label>
          </div>

          <label>
            Signal mode
            <select id="modeInput">
              <option value="fixed" selected>Fixed Top/Bottom controls</option>
              <option value="free">Free signal window</option>
            </select>
          </label>

          <div class="actions">
            <button id="runBtn">Calculate Ki</button>
            <button id="clearBtn" class="secondary">Clear</button>
          </div>
          <div id="status" class="status">Load an .xlsx file and enter binding conditions.</div>
        </div>
      </section>

      <section class="panel">
        <div class="summary">
          <div class="metric">
            <div class="label">Sheets</div>
            <div id="sheetMetric" class="value">-</div>
          </div>
          <div class="metric">
            <div class="label">Fits</div>
            <div id="curveMetric" class="value">-</div>
          </div>
          <div class="metric">
            <div class="label">Median Ki</div>
            <div id="medianMetric" class="value">-</div>
          </div>
          <div class="metric">
            <div class="label">Warnings</div>
            <div id="warningMetric" class="value">-</div>
          </div>
        </div>

        <div id="tabs" class="tabs"></div>
        <div class="table-wrap">
          <table id="resultTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="chart-panel">
          <div class="chart-controls">
            <label>
              Sheet
              <select id="chartSheet"></select>
            </label>
            <label>
              Curve
              <select id="chartCurve"></select>
            </label>
            <label>
              Time
              <select id="chartTime"></select>
            </label>
          </div>
          <canvas id="chart" width="1000" height="360"></canvas>
        </div>

        <div id="log" class="log"></div>
      </section>
    </div>
  </main>

  <script>
    const COLS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    const SAMPLE_FIRST_COL = 3;   // C
    const SAMPLE_LAST_COL = 15;   // O
    const TOP_COL = 16;           // P
    const BOTTOM_COL = 18;        // R
    const COMP_ROW = 2;
    const PROTEIN_ROW = 3;
    const TRACER_ROW = 4;
    const REP_BLOCKS = [
      { id: "Rep1", start: 7, end: 31 },
      { id: "Rep2", start: 36, end: 60 },
      { id: "Rep3", start: 65, end: 89 },
    ];

    const state = {
      workbook: null,
      inputName: "",
      parsedSheets: [],
      rows: [],
      smoothRows: [],
      summaryRows: [],
      activeTab: "Summary",
    };

    const els = {
      fileInput: document.getElementById("fileInput"),
      proteinInput: document.getElementById("proteinInput"),
      tracerInput: document.getElementById("tracerInput"),
      kdInput: document.getElementById("kdInput"),
      activeInput: document.getElementById("activeInput"),
      unitInput: document.getElementById("unitInput"),
      sourceInput: document.getElementById("sourceInput"),
      modeInput: document.getElementById("modeInput"),
      runBtn: document.getElementById("runBtn"),
      clearBtn: document.getElementById("clearBtn"),
      exportBtn: document.getElementById("exportBtn"),
      status: document.getElementById("status"),
      tabs: document.getElementById("tabs"),
      table: document.getElementById("resultTable"),
      log: document.getElementById("log"),
      sheetMetric: document.getElementById("sheetMetric"),
      curveMetric: document.getElementById("curveMetric"),
      medianMetric: document.getElementById("medianMetric"),
      warningMetric: document.getElementById("warningMetric"),
      chartSheet: document.getElementById("chartSheet"),
      chartCurve: document.getElementById("chartCurve"),
      chartTime: document.getElementById("chartTime"),
      chart: document.getElementById("chart"),
    };

    function colLetter(index1) {
      let n = index1;
      let out = "";
      while (n > 0) {
        const rem = (n - 1) % 26;
        out = String.fromCharCode(65 + rem) + out;
        n = Math.floor((n - 1) / 26);
      }
      return out;
    }

    function cellValue(ws, row, col) {
      const cell = ws[`${colLetter(col)}${row}`];
      if (!cell) return NaN;
      const value = cell.v;
      if (value == null || value === "") return NaN;
      if (value instanceof Date) return value;
      const number = Number(value);
      return Number.isFinite(number) ? number : value;
    }

    function asNumber(value) {
      if (value == null || value === "") return NaN;
      if (value instanceof Date) return NaN;
      const number = Number(value);
      return Number.isFinite(number) ? number : NaN;
    }

    function fmt(value, digits = 4) {
      if (!Number.isFinite(value)) return "";
      if (Math.abs(value) >= 1000) return value.toFixed(1);
      if (Math.abs(value) >= 10) return value.toFixed(2);
      if (Math.abs(value) >= 1) return value.toFixed(3);
      return value.toPrecision(digits);
    }

    function meanFinite(values) {
      const clean = values.filter(Number.isFinite);
      if (!clean.length) return NaN;
      return clean.reduce((a, b) => a + b, 0) / clean.length;
    }

    function median(values) {
      const clean = values.filter(Number.isFinite).sort((a, b) => a - b);
      if (!clean.length) return NaN;
      const mid = Math.floor(clean.length / 2);
      return clean.length % 2 ? clean[mid] : (clean[mid - 1] + clean[mid]) / 2;
    }

    function sd(values) {
      const clean = values.filter(Number.isFinite);
      if (clean.length < 2) return NaN;
      const avg = meanFinite(clean);
      const variance = clean.reduce((sum, v) => sum + (v - avg) ** 2, 0) / (clean.length - 1);
      return Math.sqrt(variance);
    }

    function timeToHours(value, fallbackIndex) {
      if (value instanceof Date) {
        return value.getHours() + value.getMinutes() / 60 + value.getSeconds() / 3600;
      }
      const number = Number(value);
      if (Number.isFinite(number)) {
        if (number >= 0 && number < 1) return number * 24;
        if (number <= 24) return number;
        return number / 60;
      }
      return fallbackIndex / 6;
    }

    function setStatus(text, cls = "") {
      els.status.className = `status ${cls}`.trim();
      els.status.textContent = text;
    }

    function effectiveProtein(params) {
      return params.protein * params.active;
    }

    function freeProtein(totalProtein, totalTracer, totalCompetitor, tracerKd, competitorKi) {
      if (![totalProtein, totalTracer, totalCompetitor, tracerKd, competitorKi].every(Number.isFinite)) return NaN;
      if (totalProtein <= 0 || totalTracer <= 0 || tracerKd <= 0 || competitorKi <= 0) return NaN;

      let lo = 0;
      let hi = totalProtein;
      for (let i = 0; i < 90; i += 1) {
        const p = (lo + hi) / 2;
        const tracerBound = totalTracer * p / (tracerKd + p);
        const competitorBound = totalCompetitor * p / (competitorKi + p);
        const balance = p + tracerBound + competitorBound - totalProtein;
        if (balance > 0) hi = p;
        else lo = p;
      }
      return (lo + hi) / 2;
    }

    function boundTracer(totalProtein, totalTracer, totalCompetitor, tracerKd, competitorKi) {
      const p = freeProtein(totalProtein, totalTracer, totalCompetitor, tracerKd, competitorKi);
      if (!Number.isFinite(p)) return NaN;
      return totalTracer * p / (tracerKd + p);
    }

    function modelShape(compValues, ki, params) {
      const pt = effectiveProtein(params);
      return compValues.map(comp => boundTracer(pt, params.tracer, comp, params.kd, ki));
    }

    function sseFixed(logKi, x, y, top, bottom, params) {
      const ki = Math.exp(logKi);
      const pt = effectiveProtein(params);
      const pl0 = boundTracer(pt, params.tracer, 0, params.kd, ki);
      if (!Number.isFinite(pl0) || pl0 <= 0 || !Number.isFinite(top) || !Number.isFinite(bottom)) return Infinity;
      let sse = 0;
      for (let i = 0; i < x.length; i += 1) {
        const pl = boundTracer(pt, params.tracer, x[i], params.kd, ki);
        if (!Number.isFinite(pl)) return Infinity;
        const pred = bottom + (top - bottom) * (pl / pl0);
        sse += (y[i] - pred) ** 2;
      }
      return sse;
    }

    function linearFitForKi(logKi, x, y, params) {
      const ki = Math.exp(logKi);
      const pl = modelShape(x, ki, params);
      const g = pl.map(v => v / params.tracer);
      if (g.some(v => !Number.isFinite(v))) return { sse: Infinity };

      const n = y.length;
      const sumG = g.reduce((a, b) => a + b, 0);
      const sumY = y.reduce((a, b) => a + b, 0);
      const sumGG = g.reduce((a, b) => a + b * b, 0);
      const sumGY = g.reduce((sum, v, i) => sum + v * y[i], 0);
      const denom = n * sumGG - sumG * sumG;
      if (Math.abs(denom) < 1e-14) return { sse: Infinity };

      const slope = (n * sumGY - sumG * sumY) / denom;
      const intercept = (sumY - slope * sumG) / n;
      let sse = 0;
      const predicted = g.map(v => intercept + slope * v);
      for (let i = 0; i < y.length; i += 1) sse += (y[i] - predicted[i]) ** 2;
      return { sse, ymin: intercept, amplitude: slope };
    }

    function optimizeLogKi(scoreFn, minScale, maxScale) {
      const loBase = Math.max(1e-12, minScale * 1e-7);
      const hiBase = Math.max(loBase * 10, maxScale * 1e7);
      const gridN = 160;
      const logLo = Math.log(loBase);
      const logHi = Math.log(hiBase);
      const grid = [];
      for (let i = 0; i <= gridN; i += 1) grid.push(logLo + (logHi - logLo) * i / gridN);

      let bestIndex = 0;
      let bestScore = Infinity;
      for (let i = 0; i < grid.length; i += 1) {
        const score = scoreFn(grid[i]);
        if (score < bestScore) {
          bestScore = score;
          bestIndex = i;
        }
      }

      let a = grid[Math.max(0, bestIndex - 1)];
      let b = grid[Math.min(grid.length - 1, bestIndex + 1)];
      if (a === b) {
        a = Math.max(logLo, grid[bestIndex] - (logHi - logLo) / gridN);
        b = Math.min(logHi, grid[bestIndex] + (logHi - logLo) / gridN);
      }

      const gr = (Math.sqrt(5) - 1) / 2;
      let c = b - gr * (b - a);
      let d = a + gr * (b - a);
      let fc = scoreFn(c);
      let fd = scoreFn(d);
      for (let i = 0; i < 120; i += 1) {
        if (fc < fd) {
          b = d;
          d = c;
          fd = fc;
          c = b - gr * (b - a);
          fc = scoreFn(c);
        } else {
          a = c;
          c = d;
          fc = fd;
          d = a + gr * (b - a);
          fd = scoreFn(d);
        }
      }
      const logKi = (a + b) / 2;
      return { ki: Math.exp(logKi), sse: scoreFn(logKi), logKi };
    }

    function fitCurve(compValuesRaw, yValuesRaw, top, bottom, params, mode) {
      const x = [];
      const y = [];
      for (let i = 0; i < compValuesRaw.length; i += 1) {
        const comp = Number(compValuesRaw[i]);
        const value = Number(yValuesRaw[i]);
        if (Number.isFinite(comp) && comp > 0 && Number.isFinite(value)) {
          x.push(comp);
          y.push(value);
        }
      }

      const warnings = [];
      if (x.length < 5) return { ok: false, warning: "Too few usable points", n: x.length };
      if (mode === "fixed" && (!Number.isFinite(top) || !Number.isFinite(bottom) || Math.abs(top - bottom) < 1e-9)) {
        return { ok: false, warning: "Invalid Top/Bottom controls", n: x.length };
      }

      const scaleValues = [params.protein, params.tracer, params.kd, ...x].filter(v => Number.isFinite(v) && v > 0);
      const minScale = Math.min(...scaleValues);
      const maxScale = Math.max(...scaleValues);

      let optimizer;
      let predicted;
      let ymin = NaN;
      let topModel = NaN;
      let bottomModel = NaN;

      if (mode === "fixed") {
        optimizer = optimizeLogKi(
          logKi => sseFixed(logKi, x, y, top, bottom, params),
          minScale,
          maxScale,
        );
        const pt = effectiveProtein(params);
        const pl0 = boundTracer(pt, params.tracer, 0, params.kd, optimizer.ki);
        predicted = x.map(comp => {
          const pl = boundTracer(pt, params.tracer, comp, params.kd, optimizer.ki);
          return bottom + (top - bottom) * (pl / pl0);
        });
        ymin = bottom;
        topModel = top;
        bottomModel = bottom;
      } else {
        optimizer = optimizeLogKi(
          logKi => linearFitForKi(logKi, x, y, params).sse,
          minScale,
          maxScale,
        );
        const fit = linearFitForKi(optimizer.logKi, x, y, params);
        const pt = effectiveProtein(params);
        const pl0 = boundTracer(pt, params.tracer, 0, params.kd, optimizer.ki);
        ymin = fit.ymin;
        predicted = modelShape(x, optimizer.ki, params).map(pl => fit.ymin + fit.amplitude * (pl / params.tracer));
        topModel = fit.ymin + fit.amplitude * (pl0 / params.tracer);
        bottomModel = fit.ymin;
        if (fit.amplitude <= 0) warnings.push("Free signal window fitted with non-positive amplitude");
      }

      const meanY = meanFinite(y);
      const ssTot = y.reduce((sum, value) => sum + (value - meanY) ** 2, 0);
      const ssRes = y.reduce((sum, value, i) => sum + (value - predicted[i]) ** 2, 0);
      const r2 = ssTot > 0 ? 1 - ssRes / ssTot : NaN;
      if (!Number.isFinite(optimizer.ki) || optimizer.ki <= 0) warnings.push("Ki fit failed");
      if (Number.isFinite(r2) && r2 < 0.8) warnings.push("Low R-square");
      if (mode === "fixed" && top < bottom) warnings.push("Top control is lower than Bottom control");

      return {
        ok: true,
        ki: optimizer.ki,
        r2,
        sse: ssRes,
        n: x.length,
        ymin,
        topModel,
        bottomModel,
        warning: warnings.join("; "),
      };
    }

    function parseSheet(workbook, sheetName) {
      const ws = workbook.Sheets[sheetName];
      const comp = [];
      for (let col = SAMPLE_FIRST_COL; col <= SAMPLE_LAST_COL; col += 1) {
        comp.push(asNumber(cellValue(ws, COMP_ROW, col)));
      }

      const protein = asNumber(cellValue(ws, PROTEIN_ROW, SAMPLE_FIRST_COL));
      const tracer = asNumber(cellValue(ws, TRACER_ROW, SAMPLE_FIRST_COL));
      const positiveComp = comp.filter(v => Number.isFinite(v) && v > 0);
      if (positiveComp.length < 5) return null;

      const replicates = REP_BLOCKS.map(block => {
        const points = [];
        for (let row = block.start; row <= block.end; row += 1) {
          const values = [];
          for (let col = SAMPLE_FIRST_COL; col <= SAMPLE_LAST_COL; col += 1) {
            values.push(asNumber(cellValue(ws, row, col)));
          }
          points.push({
            row,
            time_hr: timeToHours(cellValue(ws, row, 2), row - block.start),
            sample: values,
            top: asNumber(cellValue(ws, row, TOP_COL)),
            bottom: asNumber(cellValue(ws, row, BOTTOM_COL)),
            highComp: asNumber(cellValue(ws, row, SAMPLE_FIRST_COL)),
          });
        }
        return { id: block.id, points };
      });

      return { sheetName, comp, protein, tracer, replicates };
    }

    function buildMeanPoints(sheet) {
      const nRows = sheet.replicates[0].points.length;
      const points = [];
      for (let i = 0; i < nRows; i += 1) {
        const reps = sheet.replicates.map(rep => rep.points[i]);
        const sample = sheet.comp.map((_, colIdx) => meanFinite(reps.map(point => point.sample[colIdx])));
        points.push({
          row: reps[0].row,
          time_hr: meanFinite(reps.map(point => point.time_hr)),
          sample,
          top: meanFinite(reps.map(point => point.top)),
          bottom: meanFinite(reps.map(point => point.bottom)),
          highComp: meanFinite(reps.map(point => point.highComp)),
        });
      }
      return points;
    }

    function smoothCurve(compValues, fit, params, mode, top, bottom) {
      const positive = compValues.filter(v => Number.isFinite(v) && v > 0);
      const minX = Math.min(...positive);
      const maxX = Math.max(...positive);
      const xs = [];
      for (let i = 0; i < 80; i += 1) {
        const t = i / 79;
        xs.push(Math.exp(Math.log(minX) + (Math.log(maxX) - Math.log(minX)) * t));
      }

      if (!fit.ok) return [];
      const pt = effectiveProtein(params);
      if (mode === "fixed") {
        const pl0 = boundTracer(pt, params.tracer, 0, params.kd, fit.ki);
        return xs.map(x => {
          const pl = boundTracer(pt, params.tracer, x, params.kd, fit.ki);
          return { comp: x, fitted_mP: bottom + (top - bottom) * (pl / pl0) };
        });
      }

      const logKi = Math.log(fit.ki);
      const reusable = fit;
      const pl0 = boundTracer(pt, params.tracer, 0, params.kd, reusable.ki);
      const currentShape = modelShape(compValues.filter(v => Number.isFinite(v) && v > 0), reusable.ki, params);
      const yDummy = currentShape.map(v => v / params.tracer);
      void pl0;
      return xs.map(x => {
        const pl = boundTracer(pt, params.tracer, x, params.kd, reusable.ki);
        return { comp: x, fitted_mP: reusable.ymin + (reusable.topModel - reusable.ymin) * (pl / boundTracer(pt, params.tracer, 0, params.kd, reusable.ki)) };
      });
    }

    function runAnalysis() {
      if (!state.workbook) {
        setStatus("Load an Excel workbook first.", "bad");
        return;
      }

      const params = {
        protein: Number(els.proteinInput.value),
        tracer: Number(els.tracerInput.value),
        kd: Number(els.kdInput.value),
        active: Number(els.activeInput.value || 1),
        unit: els.unitInput.value,
      };

      if (![params.protein, params.tracer, params.kd, params.active].every(v => Number.isFinite(v) && v > 0)) {
        setStatus("Protein, tracer, Klig, and c must be positive numbers.", "bad");
        return;
      }

      const selectedSource = els.sourceInput.value;
      const mode = els.modeInput.value;
      const rows = [];
      const smoothRows = [];
      const summaryRows = [];
      const logRows = [];

      for (const sheet of state.parsedSheets) {
        const curveSets = [];
        if (selectedSource === "replicates") {
          for (const rep of sheet.replicates) curveSets.push({ curve: rep.id, points: rep.points });
        }
        curveSets.push({ curve: "Mean", points: buildMeanPoints(sheet) });

        for (const set of curveSets) {
          const kiWindow = [];
          const dmpWindow = [];
          let warningCount = 0;
          for (const point of set.points) {
            const fit = fitCurve(sheet.comp, point.sample, point.top, point.bottom, params, mode);
            const warning = fit.warning || "";
            if (warning) warningCount += 1;
            const timeHr = point.time_hr;
            const dmp = Number.isFinite(point.top) && Number.isFinite(point.highComp) ? point.top - point.highComp : NaN;
            if (timeHr >= 2 && timeHr <= 4 && fit.ok && Number.isFinite(fit.ki)) kiWindow.push(fit.ki);
            if (timeHr >= 2 && timeHr <= 4 && Number.isFinite(dmp)) dmpWindow.push(dmp);
            rows.push({
              sheet: sheet.sheetName,
              curve: set.curve,
              time_hr: timeHr,
              Ki: fit.ok ? fit.ki : NaN,
              R_squared: fit.ok ? fit.r2 : NaN,
              dMP: dmp,
              top_mP: point.top,
              bottom_mP: point.bottom,
              high_comp_mP: point.highComp,
              n_points: fit.n || 0,
              fit_mode: mode,
              warning,
            });

            const smooth = smoothCurve(sheet.comp, fit, params, mode, point.top, point.bottom);
            for (const item of smooth) {
              smoothRows.push({
                sheet: sheet.sheetName,
                curve: set.curve,
                time_hr: timeHr,
                comp: item.comp,
                fitted_mP: item.fitted_mP,
                Ki: fit.ok ? fit.ki : NaN,
              });
            }
          }
          const meanKi = meanFinite(kiWindow);
          summaryRows.push({
            sheet: sheet.sheetName,
            curve: set.curve,
            mean_Ki_2to4hr: meanKi,
            sd_Ki_2to4hr: sd(kiWindow),
            cv_percent_2to4hr: Number.isFinite(meanKi) && Math.abs(meanKi) > 1e-12 ? 100 * sd(kiWindow) / meanKi : NaN,
            mean_dMP_2to4hr: meanFinite(dmpWindow),
            warning_count: warningCount,
          });
          if (warningCount) logRows.push(`${sheet.sheetName} / ${set.curve}: ${warningCount} warnings`);
        }
      }

      state.rows = rows;
      state.smoothRows = smoothRows;
      state.summaryRows = summaryRows;
      state.activeTab = "Summary";
      render();
      updateChartSelectors();
      setStatus(`Calculated ${rows.length} curves using ${mode === "fixed" ? "fixed controls" : "free signal window"}.`, "good");
      els.exportBtn.disabled = !rows.length;
      els.log.textContent = logRows.length ? logRows.join("\n") : "No warnings.";
    }

    function renderTabs() {
      const tabs = ["Summary", "All Fits"];
      els.tabs.innerHTML = "";
      for (const tab of tabs) {
        const btn = document.createElement("button");
        btn.className = `tab ${state.activeTab === tab ? "active" : ""}`;
        btn.textContent = tab;
        btn.addEventListener("click", () => {
          state.activeTab = tab;
          render();
        });
        els.tabs.appendChild(btn);
      }
    }

    function renderTable() {
      const table = els.table;
      const thead = table.querySelector("thead");
      const tbody = table.querySelector("tbody");
      const isSummary = state.activeTab === "Summary";
      const rows = isSummary ? state.summaryRows : state.rows;
      const columns = isSummary
        ? ["sheet", "curve", "mean_Ki_2to4hr", "sd_Ki_2to4hr", "cv_percent_2to4hr", "mean_dMP_2to4hr", "warning_count"]
        : ["sheet", "curve", "time_hr", "Ki", "R_squared", "dMP", "top_mP", "bottom_mP", "high_comp_mP", "n_points", "fit_mode", "warning"];

      thead.innerHTML = `<tr>${columns.map(col => `<th>${col}</th>`).join("")}</tr>`;
      tbody.innerHTML = rows.map(row => {
        return `<tr>${columns.map(col => {
          const value = row[col];
          const text = typeof value === "number" ? fmt(value) : (value ?? "");
          return `<td>${text}</td>`;
        }).join("")}</tr>`;
      }).join("");
    }

    function renderMetrics() {
      const kiValues = state.rows.map(row => row.Ki).filter(Number.isFinite);
      const warningCount = state.rows.filter(row => row.warning).length;
      els.sheetMetric.textContent = String(state.parsedSheets.length || "-");
      els.curveMetric.textContent = String(state.rows.length || "-");
      els.medianMetric.textContent = Number.isFinite(median(kiValues)) ? `${fmt(median(kiValues))} ${els.unitInput.value}` : "-";
      els.warningMetric.textContent = String(warningCount || 0);
    }

    function render() {
      renderTabs();
      renderTable();
      renderMetrics();
      drawChart();
    }

    function updateChartSelectors() {
      const sheets = [...new Set(state.rows.map(row => row.sheet))];
      els.chartSheet.innerHTML = sheets.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
      updateCurveOptions();
      drawChart();
    }

    function updateCurveOptions() {
      const sheet = els.chartSheet.value;
      const curves = [...new Set(state.rows.filter(row => row.sheet === sheet).map(row => row.curve))];
      els.chartCurve.innerHTML = curves.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join("");
      updateTimeOptions();
    }

    function updateTimeOptions() {
      const sheet = els.chartSheet.value;
      const curve = els.chartCurve.value;
      const times = state.rows
        .filter(row => row.sheet === sheet && row.curve === curve)
        .map(row => row.time_hr);
      els.chartTime.innerHTML = times.map(t => `<option value="${t}">${fmt(t, 3)} hr</option>`).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function drawChart() {
      const canvas = els.chart;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const sheet = els.chartSheet.value;
      const curve = els.chartCurve.value;
      const time = Number(els.chartTime.value);
      if (!sheet || !curve || !Number.isFinite(time)) {
        drawEmptyChart(ctx, canvas, "No curve selected");
        return;
      }

      const parsed = state.parsedSheets.find(item => item.sheetName === sheet);
      if (!parsed) {
        drawEmptyChart(ctx, canvas, "No data");
        return;
      }

      let point = null;
      if (curve === "Mean") {
        point = buildMeanPoints(parsed).find(p => Math.abs(p.time_hr - time) < 1e-9);
      } else {
        const rep = parsed.replicates.find(r => r.id === curve);
        point = rep && rep.points.find(p => Math.abs(p.time_hr - time) < 1e-9);
      }

      const smooth = state.smoothRows.filter(row =>
        row.sheet === sheet && row.curve === curve && Math.abs(row.time_hr - time) < 1e-9
      );
      if (!point || !smooth.length) {
        drawEmptyChart(ctx, canvas, "No fitted curve");
        return;
      }

      const obs = parsed.comp.map((comp, idx) => ({ comp, mP: point.sample[idx] }))
        .filter(p => Number.isFinite(p.comp) && p.comp > 0 && Number.isFinite(p.mP));
      const allY = [...obs.map(p => p.mP), ...smooth.map(p => p.fitted_mP)].filter(Number.isFinite);
      const allX = [...obs.map(p => p.comp), ...smooth.map(p => p.comp)].filter(v => Number.isFinite(v) && v > 0);
      if (!allX.length || !allY.length) {
        drawEmptyChart(ctx, canvas, "No chart data");
        return;
      }

      const pad = { l: 68, r: 24, t: 26, b: 58 };
      const minLog = Math.log10(Math.min(...allX));
      const maxLog = Math.log10(Math.max(...allX));
      const minY = Math.min(...allY) - 0.08 * (Math.max(...allY) - Math.min(...allY) || 1);
      const maxY = Math.max(...allY) + 0.08 * (Math.max(...allY) - Math.min(...allY) || 1);
      const xMap = x => pad.l + (Math.log10(x) - minLog) / (maxLog - minLog || 1) * (canvas.width - pad.l - pad.r);
      const yMap = y => canvas.height - pad.b - (y - minY) / (maxY - minY || 1) * (canvas.height - pad.t - pad.b);

      ctx.strokeStyle = "#d9e0e7";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pad.l, pad.t);
      ctx.lineTo(pad.l, canvas.height - pad.b);
      ctx.lineTo(canvas.width - pad.r, canvas.height - pad.b);
      ctx.stroke();

      ctx.fillStyle = "#61717f";
      ctx.font = "13px Segoe UI, Arial";
      ctx.fillText("mP", 18, 32);
      ctx.fillText(`Competitor (${els.unitInput.value}, log scale)`, canvas.width / 2 - 90, canvas.height - 18);

      ctx.strokeStyle = "#176b87";
      ctx.lineWidth = 3;
      ctx.beginPath();
      smooth.forEach((p, idx) => {
        const x = xMap(p.comp);
        const y = yMap(p.fitted_mP);
        if (idx === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = "#7a4b2a";
      obs.forEach(p => {
        ctx.beginPath();
        ctx.arc(xMap(p.comp), yMap(p.mP), 4.5, 0, Math.PI * 2);
        ctx.fill();
      });

      const fit = state.rows.find(row => row.sheet === sheet && row.curve === curve && Math.abs(row.time_hr - time) < 1e-9);
      ctx.fillStyle = "#172026";
      ctx.font = "15px Segoe UI, Arial";
      ctx.fillText(`${sheet} / ${curve} / ${fmt(time, 3)} hr`, pad.l, 18);
      if (fit) {
        ctx.fillText(`Ki ${fmt(fit.Ki)} ${els.unitInput.value}   R2 ${fmt(fit.R_squared)}`, pad.l + 360, 18);
      }
    }

    function drawEmptyChart(ctx, canvas, text) {
      ctx.fillStyle = "#61717f";
      ctx.font = "16px Segoe UI, Arial";
      ctx.fillText(text, 32, 48);
    }

    function exportWorkbook() {
      if (!state.rows.length) return;
      const settings = [{
        input_file: state.inputName,
        exported_at: new Date().toISOString(),
        protein_total: Number(els.proteinInput.value),
        tracer_total: Number(els.tracerInput.value),
        tracer_kd_klig: Number(els.kdInput.value),
        active_protein_c: Number(els.activeInput.value || 1),
        unit: els.unitInput.value,
        fit_source: els.sourceInput.value,
        signal_mode: els.modeInput.value,
        model: "Pt_eff = P + Lt*P/(Klig+P) + It*P/(Ki+P); mP fitted from tracer-bound fraction",
      }];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(settings), "Settings");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.summaryRows), "Summary");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.rows), "All_Fits");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(state.smoothRows), "Fit_Curves");
      const stem = (state.inputName || "bicycle_ki").replace(/\.(xlsx|xlsm)$/i, "");
      XLSX.writeFile(wb, `${stem}_bicycle_Ki.xlsx`);
    }

    function clearAll() {
      state.workbook = null;
      state.inputName = "";
      state.parsedSheets = [];
      state.rows = [];
      state.smoothRows = [];
      state.summaryRows = [];
      els.fileInput.value = "";
      els.exportBtn.disabled = true;
      els.log.textContent = "";
      els.tabs.innerHTML = "";
      els.table.querySelector("thead").innerHTML = "";
      els.table.querySelector("tbody").innerHTML = "";
      els.chartSheet.innerHTML = "";
      els.chartCurve.innerHTML = "";
      els.chartTime.innerHTML = "";
      renderMetrics();
      drawChart();
      setStatus("Cleared.", "");
    }

    async function handleFile(file) {
      if (!window.XLSX) {
        setStatus("Excel library did not load. Check internet access for the CDN script.", "bad");
        return;
      }
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: "array", cellDates: true, cellFormula: true });
      const parsedSheets = workbook.SheetNames
        .filter(name => !/^plate\b/i.test(name))
        .map(name => parseSheet(workbook, name))
        .filter(Boolean);

      state.workbook = workbook;
      state.inputName = file.name;
      state.parsedSheets = parsedSheets;

      if (!parsedSheets.length) {
        setStatus("No assay sheets matching the C:R template were found.", "bad");
        return;
      }

      if (!els.proteinInput.value && Number.isFinite(parsedSheets[0].protein)) {
        els.proteinInput.value = parsedSheets[0].protein;
      }
      if (!els.tracerInput.value && Number.isFinite(parsedSheets[0].tracer)) {
        els.tracerInput.value = parsedSheets[0].tracer;
      }

      setStatus(`Loaded ${parsedSheets.length} assay sheets from ${file.name}.`, "good");
      els.sheetMetric.textContent = String(parsedSheets.length);
      els.curveMetric.textContent = "-";
      els.medianMetric.textContent = "-";
      els.warningMetric.textContent = "-";
    }

    els.fileInput.addEventListener("change", event => {
      const file = event.target.files && event.target.files[0];
      if (file) handleFile(file).catch(error => setStatus(error.message, "bad"));
    });
    els.runBtn.addEventListener("click", runAnalysis);
    els.clearBtn.addEventListener("click", clearAll);
    els.exportBtn.addEventListener("click", exportWorkbook);
    els.chartSheet.addEventListener("change", () => { updateCurveOptions(); drawChart(); });
    els.chartCurve.addEventListener("change", () => { updateTimeOptions(); drawChart(); });
    els.chartTime.addEventListener("change", drawChart);

    drawChart();
  </script>
</body>
</html>
